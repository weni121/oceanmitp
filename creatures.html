<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oceanmi </title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .page-header {
    text-align: center;
    padding: 32px 0 8px;
    animation: fadeDown 0.5s ease both;
  }
  .page-header .lab-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .page-header h1 {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 600;
  }
  .page-header h1 span { color: var(--teal-light); }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    text-decoration: none;
    letter-spacing: 0.08em;
    opacity: 0.75;
    transition: opacity 0.2s;
  }
  .back-btn:hover { opacity: 1; }

  /* Slider */
  .slider-wrap {
    position: relative;
    animation: fadeDown 0.5s 0.15s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .slider-track {
    overflow: hidden;
    border-radius: 20px;
  }

  .slider-inner {
    display: flex;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  }

  .creature-slide {
    min-width: 100%;
    background: rgba(13,34,64,0.8);
    border: 1px solid rgba(93,202,165,0.25);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(29,158,117,0.1);
  }

  .slide-hero {
    padding: 40px 24px 28px;
    text-align: center;
    background: rgba(29,158,117,0.07);
    border-bottom: 1px solid rgba(93,202,165,0.15);
    position: relative;
  }
  .slide-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 80%, rgba(29,158,117,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .slide-emoji {
    font-size: 68px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(93,202,165,0.35));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .slide-name { font-size: 26px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .slide-en {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    letter-spacing: 0.12em;
  }

  .slide-body { padding: 22px 24px 28px; }

  .slide-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .slide-tag {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 99px;
    background: rgba(29,158,117,0.15);
    border: 1px solid rgba(93,202,165,0.3);
    color: var(--teal-light);
    font-family: 'Space Mono', monospace;
  }

  .slide-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--teal-light);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .slide-desc {
    font-size: 14.5px;
    line-height: 1.8;
    color: rgba(232,244,240,0.85);
    margin-bottom: 20px;
  }

  .slide-compat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .slide-compat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--teal-light);
    font-family: 'Space Mono', monospace;
    opacity: 0.8;
    margin-bottom: 4px;
  }
  .slide-compat-val { font-size: 15px; font-weight: 500; }

  /* Nav arrows */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    gap: 12px;
  }

  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(93,202,165,0.3);
    background: rgba(29,158,117,0.08);
    color: var(--teal-light);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(29,158,117,0.2); border-color: var(--teal); color: #fff; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  /* Dot indicators */
  .dots {
    display: flex;
    gap: 7px;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  .dot-ind {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(93,202,165,0.25);
    border: 1px solid rgba(93,202,165,0.3);
    transition: all 0.3s;
    cursor: pointer;
  }
  .dot-ind.active {
    background: var(--teal-light);
    width: 20px;
    border-radius: 4px;
  }

  /* Bottom CTA */
  .cta-wrap {
    margin-top: 20px;
    animation: fadeDown 0.5s 0.3s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  .cta-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid rgba(93,202,165,0.3);
    border-radius: 12px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px;
    color: var(--teal-light);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
  }
  .cta-btn:hover { background: rgba(29,158,117,0.1); border-color: var(--teal); color: #fff; }
</style>
</head>
<body>

<div class="bubbles-bg" id="bubbles"></div>

<div id="app">
  <div class="page-header">
    <div class="lab-tag">DEEP SEA RESEARCH INSTITUTE · LAB-7743</div>
    <h1>สัตว์น้ำ<span>ทั้งหมด</span></h1>
  </div>

  <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>

  <div class="slider-wrap">
    <div class="slider-track">
      <div class="slider-inner" id="slider-inner"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="move(-1)">←</button>
      <div class="dots" id="dots"></div>
      <button class="nav-btn" id="btn-next" onclick="move(1)">→</button>
    </div>
  </div>

  <div class="cta-wrap">
    <a href="index.html" class="cta-btn">🔬 ทำแบบทดสอบดูว่าเจ้าเป็นตัวไหน</a>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  const list = Object.values(CREATURES);
  let cur = 0;

  // build slides
  const inner = document.getElementById('slider-inner');
  const dotsEl = document.getElementById('dots');

  list.forEach((c, i) => {
    // slide
    const slide = document.createElement('div');
    slide.className = 'creature-slide';
    slide.innerHTML = `
      <div class="slide-hero">
        <span class="slide-emoji">${c.emoji}</span>
        <div class="slide-name">${c.th}</div>
        <div class="slide-en">${c.en}</div>
      </div>
      <div class="slide-body">
        <div class="slide-tags">
          ${c.tags.map(t => `<span class="slide-tag">${t}</span>`).join('')}
        </div>

        <div class="slide-label">"บุคลิกของเจ้า?"</div>
        <div class="slide-desc">${c.desc}</div>

        <div class="slide-divider"></div>

        <div class="slide-label">"จุดแข็งความรัก?"</div>
        <div class="slide-desc">
          <ul class="slide-list">
            ${(c.loveStrength || []).map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>

        <div class="slide-label">"จุดอ่อนความรัก?"</div>
        <div class="slide-desc">
          <ul class="slide-list">
            ${(c.loveWeakness || []).map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>

        <div class="slide-label">"ความลึกซึ้งภายใน"</div>
        <div class="slide-desc">${c.deep || '-'}</div>

        <div class="slide-divider"></div>

        <div class="slide-compat-item">
          <div class="slide-label">"เข้ากันได้ดีกับ?"</div>
          <div class="slide-compat-val">${c.compat}</div>
        </div>
      </div>`;
    inner.appendChild(slide);

    // dot
    const dot = document.createElement('div');
    dot.className = 'dot-ind' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });

  function goTo(idx) {
    cur = idx;
    inner.style.transform = `translateX(-${cur * 100}%)`;
    document.querySelectorAll('.dot-ind').forEach((d, i) => d.classList.toggle('active', i === cur));
    document.getElementById('btn-prev').disabled = cur === 0;
    document.getElementById('btn-next').disabled = cur === list.length - 1;
  }

  function move(dir) { goTo(Math.max(0, Math.min(list.length - 1, cur + dir))); }

  // touch / swipe
  let startX = 0;
  const track = document.querySelector('.slider-track');
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) move(dx < 0 ? 1 : -1);
  });

  // bubble bg (same as quiz)
  const wrap = document.getElementById('bubbles');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'bubble-particle';
    const sz = 6 + Math.random() * 20;
    b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;opacity:${0.3+Math.random()*0.4}`;
    wrap.appendChild(b);
  }

  goTo(0);
</script>
</body>
</html>
