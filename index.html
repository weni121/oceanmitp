<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> oceanmi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bubbles-bg" id="bubbles"></div>

<div id="app">
  <div class="site-header">

  </div>

  <!-- หน้าแชทคำถาม -->
  <div id="screen-chat" class="screen active">
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="prog"></div>
      </div>
      <div class="progress-num" id="prog-num">0 / 15</div>

    <div class="chat-log" id="chat-log"></div>
    <div class="choices-area" id="choices"></div>

  <!-- หน้าผลลัพธ์ -->
  <div id="screen-result" class="screen">
    <div class="result-wrap">
      <div class="result-card" id="result-card"></div>
      <button class="restart-btn" onclick="restart()">🔄 เริ่มทดสอบใหม่อีกครั้ง</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
